name: QA CI Pipeline

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  automated-tests:
    name: Automated tests and evidence
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Ejecutar pruebas automatizadas
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts
          python -m unittest discover -s tests -v 2>&1 | tee artifacts/test-results.txt

      - name: Publicar evidencia de pruebas
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: automated-test-report
          path: artifacts/test-results.txt
          if-no-files-found: error
          retention-days: 14

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del historial completo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detectar secretos expuestos
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  quality-gate:
    name: Quality Gate
    if: always()
    needs:
      - automated-tests
      - secret-scan
    runs-on: ubuntu-latest

    steps:
      - name: Evaluar criterios obligatorios
        env:
          TEST_RESULT: ${{ needs.automated-tests.result }}
          SECRET_SCAN_RESULT: ${{ needs.secret-scan.result }}
        shell: bash
        run: |
          echo "Pruebas automatizadas y evidencia: ${TEST_RESULT}"
          echo "Análisis de secretos: ${SECRET_SCAN_RESULT}"

          if [[ "${TEST_RESULT}" != "success" || "${SECRET_SCAN_RESULT}" != "success" ]]; then
            echo "::error::El Pull Request no cumple los Quality Gates."
            exit 1
          fi

          echo "Todos los Quality Gates activos fueron aprobados."
