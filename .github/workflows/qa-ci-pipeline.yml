name: QA CI Pipeline

on:
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Instalación de dependencias (ej. pip)
      run: |
        python -m pip install --upgrade pip
        # Aquí se instalarían las dependencias de las pruebas, por ejemplo:
        # pip install pytest

    - name: Ejecución de pruebas automatizadas
      run: |
        echo "Ejecutando pruebas automatizadas..."
        python -c "print('Todas las pruebas pasaron exitosamente.')" # Placeholder de prueba

    - name: Generación de reporte o logs
      run: |
        echo "Generando reporte de pruebas..."
        echo "Reporte de pruebas generado el $(date)" > test_report.txt

    - name: Publicación de artefactos
      uses: actions/upload-artifact@v4
      with:
        name: test-report
        path: test_report.txt
